"$schema" = 'https://starship.rs/config-schema.json'
palette = "monokai_mnml"

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$git_commit\
$fill\
$c$cpp$rust$golang$nodejs$php$java$kotlin$haskell$python\
$docker_context\
$conda\
$time\
$battery\
$line_break\
$character"""

[fill]
symbol = " "
style = "bold gray"

[line_break]
disabled = false

[character]
success_symbol = "[έζψ](purple)"
error_symbol = "[έζψ](red)"
vimcmd_symbol = "[έζχ](green)"

[os]
disabled = false
style = "fg:color_green"

[username]
show_always = true
format = "[$user]($style)"
style_user = "fg:color_red"
style_root = "fg:color_red"

[directory]
format = "[ $path ]($style)"
style = "fg:color_yellow"
truncation_length = 3
truncation_symbol = "έΑο/"
read_only = " ≤░Ν╛"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "≤░ζγ "
"Pictures" = "ΎΑ╛ "
"Developer" = "≤░▓Μ "

[git_branch]
symbol = "ΎΡα"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed white"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "έΨΙ"
charging_symbol = "[έΗΣ](italic bold green)"
discharging_symbol = "έΗΥ"
unknown_symbol = "έΨΣ"
empty_symbol = "έΨΔ"

[[battery.display]]
threshold = 20
style = "italic bold"

[[battery.display]]
threshold = 60
style = "italic dimmed"

[[battery.display]]
threshold = 70
style = "italic dimmed"

[palettes.monokai_mnml]
color_red = '#FC618D'
color_orange = '#FD9353'
color_yellow = '#FCE566'
color_green = '#7BD88F'
color_blue = '#5AD4E6'
color_purple = '#948AE3'

[palettes.monokai_spectrum]
