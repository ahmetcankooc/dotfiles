"$schema" = 'https://starship.rs/config-schema.json'
palette = "monokai_mnml"

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$fill\
$c$cpp$rust$golang$nodejs$php$java$kotlin$haskell$python\
$docker_context\
$conda\
$time\
$battery\
$line_break\
$character"""

[fill]
symbol = " "
style = "bold gray"

[line_break]
disabled = false

[character]
success_symbol = "[ÔØ»](purple)"
error_symbol = "[ÔØ»](red)"
vimcmd_symbol = "[ÔØ«](green)"

[os]
disabled = false
style = "fg:color_green"

[username]
show_always = true
format = "[$user]($style)"
style_user = "fg:color_red"
style_root = "fg:color_red"

[directory]
format = "[ $path ]($style)"
style = "fg:color_yellow"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"
read_only = " ¾░î¥"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éİ"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed white"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "Ôûê"
charging_symbol = "[Ôåæ](italic bold green)"
discharging_symbol = "Ôåô"
unknown_symbol = "Ôûæ"
empty_symbol = "Ôûâ"

[[battery.display]]
threshold = 20
style = "italic bold"

[[battery.display]]
threshold = 60
style = "italic dimmed"

[[battery.display]]
threshold = 70
style = "italic dimmed"

